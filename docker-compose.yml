services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - storage:/var/www/html/storage
      - public:/var/www/html/public
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capintake

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - capintake

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootsecret}"
      MYSQL_DATABASE: "${DB_DATABASE:-capintake}"
      MYSQL_USER: "${DB_USERNAME:-capintake}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capintake

  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capintake

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    command: ["sh", "-c", "while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capintake

volumes:
  dbdata:
  storage:
  public:

networks:
  capintake:
    driver: bridge
