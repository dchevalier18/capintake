# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: https://render.com/deploy?repo=https://github.com/dchevalier18/capintake

services:
  - type: web
    name: capintake
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: CAPIntake
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      # APP_URL is derived from Render's RENDER_EXTERNAL_URL in the
      # container entrypoint (includes the https:// scheme).
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: capintake-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: capintake-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: capintake-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: capintake-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: capintake-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: MAIL_MAILER
        value: log
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning

databases:
  - name: capintake-db
    plan: basic-256mb
    databaseName: capintake
    user: capintake
