name: Docker Build Check

# Builds the production image (without pushing) whenever the container
# definition changes, so broken builds are caught in CI instead of at
# deploy time on Render or a self-hosted server.
on:
  pull_request:
    paths:
      - Dockerfile
      - docker/**
      - render.yaml
      - composer.json
      - composer.lock
      - package.json
      - package-lock.json
  push:
    branches: [master]
    paths:
      - Dockerfile
      - docker/**

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
